[settings]
; ============================================================
; PJSIP Realtime (Sorcery realtime,ps_*)
; Fonte REAL é definida aqui.
;
; ATUAL:  MySQL/MariaDB (connection = asterisk)
; FUTURO: SQL Server    (connection = asterisk-mssql)
; ============================================================

; ----------------------------
; ATUAL (MySQL/MariaDB via ODBC)
; ----------------------------
;ps_endpoints        => odbc,asterisk,ps_endpoints
;ps_auths            => odbc,asterisk,ps_auths
;ps_aors             => odbc,asterisk,ps_aors
;ps_endpoint_id_ips  => odbc,asterisk,ps_endpoint_id_ips
;ps_domain_aliases  => odbc,asterisk,ps_domain_aliases
;ps_contacts        => odbc,asterisk,ps_contacts

; ----------------------------
; FUTURO (SQL Server via ODBC)
; (precisa existir em res_odbc.conf como [asterisk-mssql]
;  e em odbc.ini como DSN asterisk-rt-mssql)
; ----------------------------
ps_endpoints        => odbc,asterisk-mssql,ps_endpoints
ps_auths            => odbc,asterisk-mssql,ps_auths
ps_aors             => odbc,asterisk-mssql,ps_aors
ps_endpoint_id_ips  => odbc,asterisk-mssql,ps_endpoint_id_ips
;ps_domain_aliases   => odbc,asterisk-mssql,ps_domain_aliases
;ps_contacts         => odbc,asterisk-mssql,ps_contacts
